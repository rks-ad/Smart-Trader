services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: fpldb-advik
      POSTGRES_USER: fplpsdb
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}   # Ensure this is set in Dokploy environment
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fplpsdb -d fpldb-advik"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ./backend:/app                    
      - static_files:/app/staticfiles
      - media_files:/app/media
    env_file:
      - ./backend/config/.env
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             daphne -b 0.0.0.0 -p 8000 mlm_project.asgi:application"

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/config/.env
    depends_on:
      - backend
      - redis
    command: celery -A mlm_project worker -l info

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/config/.env
    depends_on:
      - backend
      - redis
    command: celery -A mlm_project beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:                                   
        VITE_API_URL: https://ds.finviral.com
        VITE_WS_URL: wss://ds.finviral.com
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
    expose:
      - "3000"
    environment:
      - VITE_API_URL=https://ds.finviral.com
      - VITE_WS_URL=wss://ds.finviral.com

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_files:/var/www/static
      - media_files:/var/www/media
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  static_files:
  media_files:
